context:
  version: "0.36.0"

package:
  name: dumbpipe
  version: ${{ version }}

source:
  url: https://github.com/n0-computer/dumbpipe/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 88088e77da5dc4c805f27d5b36cd8b3ea38626eddaf8dda7a0a3d5f4cb55da86

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
      # Ring's C/asm code requires clang-cl (not MSVC cl.exe) when targeting
      # aarch64-pc-windows-msvc. These vars are only consulted by cargo / cc-rs
      # when CARGO_BUILD_TARGET is that triple, so they are inert elsewhere.
      CC_aarch64_pc_windows_msvc: clang-cl
      AR_aarch64_pc_windows_msvc: llvm-lib
      CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER: lld-link
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - if: target_platform == "win-arm64"
            then:
              - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path . --target aarch64-pc-windows-msvc
            else:
              - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - if: target_platform == "win-arm64"
      then:
        - clang
        - lld

tests:
  - script: dumbpipe --help
  - package_contents:
      bin:
        - dumbpipe
      strict: true

about:
  homepage: https://github.com/n0-computer/dumbpipe
  summary: A CLI tool to pipe data over the network, with NAT hole punching
  description: |
    dumbpipe is a CLI tool that creates unix-style pipes between devices
    over the network, built on the iroh peer-to-peer networking platform.
    It uses NAT hole punching to establish direct connections between
    peers, making it a simple netcat-like utility for arbitrary data
    streams.
  license: Apache-2.0 OR MIT
  license_file:
    - LICENSE-APACHE
    - LICENSE-MIT
    - THIRDPARTY.yml
  repository: https://github.com/n0-computer/dumbpipe

extra:
  recipe-maintainers:
    - baszalmstra
